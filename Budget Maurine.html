<style>
:root{
  --bg:#FFF5F8;          /* page background */
  --surface:#FFFFFF;     /* cards */
  --surface-2:#FCEEF3;   /* inputs, subtle fills */
  --line:#F6DCE6;        /* borders */
  --text:#3A1F2B;        /* primary text */
  --muted:#9C7080;       /* secondary text */
  --faint:#C99BAD;       /* labels */
  --brand:#E9577F;       /* primary pink */
  --brand-soft:#FCE2EA;
  --green:#16A34A;
  --green-soft:#DCFCE7;
  --amber:#D97706;
  --amber-soft:#FEF3C7;
  --red:#DC2626;
  --red-soft:#FEE2E2;
  --shadow:0 1px 2px rgba(58,31,43,.04),0 8px 24px rgba(58,31,43,.07);
  --shadow-sm:0 1px 2px rgba(58,31,43,.05);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',sans-serif;min-height:100vh;overscroll-behavior:none;font-feature-settings:"tnum"}
#root{max-width:430px;margin:0 auto;padding-bottom:88px;min-height:100vh}
.safe{padding-top:env(safe-area-inset-top,44px)}
.safebot{padding-bottom:env(safe-area-inset-bottom,20px)}
.num{font-variant-numeric:tabular-nums}
input{background:var(--surface-2);border:1.5px solid transparent;border-radius:11px;padding:12px 13px;color:var(--text);font-size:15px;font-family:inherit;outline:none;width:100%;-webkit-appearance:none;appearance:none;transition:border-color .15s,background .15s}
input[type=number]{-moz-appearance:textfield}
input::placeholder{color:var(--faint)}
input:focus{border-color:var(--brand);background:#fff}
.hidden{display:none!important}

/* ── Header ───────────────────────────────── */
.head{padding:6px 18px 4px}
.head-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2px}
.head-month{font-size:13px;color:var(--muted);font-weight:600}
.head-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}

/* Hero card */
.hero{margin:8px 14px 0;background:linear-gradient(135deg,#E9577F,#F5899F);border-radius:22px;padding:20px 20px 18px;color:#fff;box-shadow:0 10px 30px rgba(233,87,127,.28)}
.hero-label{font-size:12px;opacity:.85;font-weight:600;letter-spacing:.3px}
.hero-amount{font-size:38px;font-weight:800;letter-spacing:-1.2px;margin-top:2px;line-height:1}
.hero-bar-bg{height:7px;border-radius:6px;background:rgba(255,255,255,.25);margin-top:16px;overflow:hidden}
.hero-bar{height:100%;border-radius:6px;background:#fff;transition:width .5s ease}
.hero-foot{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;opacity:.9}

/* Stat chips */
.stats{display:flex;gap:10px;padding:14px 14px 0}
.stat{flex:1;background:var(--surface);border-radius:16px;padding:12px;box-shadow:var(--shadow-sm);border:1px solid var(--line)}
.stat-label{font-size:11px;color:var(--faint);font-weight:600;margin-bottom:4px}
.stat-val{font-size:17px;font-weight:800;letter-spacing:-.3px}

/* Sections */
.tab-content{padding:0 14px}
.section-title{font-size:13px;color:var(--muted);font-weight:700;margin:22px 4px 12px;display:flex;align-items:center;justify-content:space-between}
.section-title .muted{font-weight:600;color:var(--faint);font-size:12px}

/* Week card */
.week-card{background:var(--surface);border-radius:18px;margin-bottom:11px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow-sm)}
.week-row{display:flex;align-items:center;padding:14px 15px;cursor:pointer;user-select:none}
.week-info{flex:1;margin-left:13px;min-width:0}
.week-name{font-weight:700;font-size:15px}
.week-amounts{font-size:12.5px;color:var(--muted);margin-top:2px;font-weight:500}
.week-left{font-size:13px;font-weight:700;margin-top:3px}
.week-over{color:var(--red);margin-left:6px;font-weight:700}
.week-bar-bg{margin-top:8px;height:5px;border-radius:4px;background:var(--surface-2);overflow:hidden}
.week-bar{height:100%;border-radius:4px;transition:width .4s}
.btn-add{background:var(--brand);border:none;color:#fff;border-radius:11px;width:36px;height:36px;font-size:22px;margin-left:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;box-shadow:0 3px 8px rgba(46,100,255,.3)}
.chev{margin-left:6px;color:var(--faint);font-size:13px;transition:transform .25s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}

/* Expense list */
.exp-list{border-top:1px solid var(--line);padding:6px 15px 12px;background:#FBFCFE}
.exp-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}
.exp-row:last-of-type{border-bottom:none}
.exp-name{font-size:14px;font-weight:600}
.exp-note{font-size:11.5px;color:var(--muted);margin-top:1px}
.exp-right{display:flex;align-items:center;gap:10px}
.exp-amount{font-size:14px;font-weight:700;color:var(--amber)}
.btn-del{background:none;border:none;color:var(--faint);font-size:20px;cursor:pointer;line-height:1;padding:0 2px}
.exp-total{display:flex;justify-content:flex-end;margin-top:10px;font-size:13px;font-weight:700}
.exp-empty{color:var(--faint);font-size:13px;text-align:center;padding:14px 0}

/* ── Charts ───────────────────────────────── */
.card{background:var(--surface);border-radius:18px;border:1px solid var(--line);box-shadow:var(--shadow-sm);padding:16px;margin-bottom:12px}
.card-h{font-size:14px;font-weight:700;margin-bottom:2px}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.chart-svg{width:100%;display:block;overflow:visible}
.legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:14px}
.leg-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:500}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.leg-val{color:var(--text);font-weight:700;margin-left:2px}
.empty-chart{text-align:center;color:var(--faint);font-size:13px;padding:30px 0}

/* ── Modal ───────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:flex-end;z-index:200;backdrop-filter:blur(2px)}
.modal-box{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:430px;margin:0 auto;padding:22px 20px;padding-bottom:calc(22px + env(safe-area-inset-bottom,0px));animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
.modal-grip{width:38px;height:4px;border-radius:3px;background:var(--line);margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:800;margin-bottom:18px}
.field{margin-bottom:14px}
.field-label{font-size:11px;color:var(--faint);font-weight:700;margin-bottom:6px;letter-spacing:.4px}
.quick-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.quick-chip{background:var(--surface-2);border:1.5px solid transparent;border-radius:20px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit}
.quick-chip.sel{background:var(--brand-soft);border-color:var(--brand);color:var(--brand)}
.modal-btns{display:flex;gap:10px;margin-top:4px}
.btn-cancel{flex:1;padding:14px;border-radius:14px;background:var(--surface-2);border:none;color:var(--text);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-confirm{flex:2;padding:14px;border-radius:14px;background:var(--brand);border:none;color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}

/* ── Config ───────────────────────────────── */
.config-wrap{padding:0 14px}
.config-title{font-size:22px;font-weight:800;letter-spacing:-.5px}
.config-sub{font-size:13px;color:var(--muted);margin:2px 0 18px}
.sec-head{font-size:12px;color:var(--brand);letter-spacing:.4px;text-transform:uppercase;margin-bottom:9px;font-weight:700}
.sec-box{background:var(--surface);border-radius:16px;padding:13px 13px 9px;border:1px solid var(--line);box-shadow:var(--shadow-sm);margin-bottom:18px}
.item-row{display:flex;gap:8px;margin-bottom:9px;align-items:center}
.item-row input:first-child{flex:2}
.item-row input:nth-child(2){flex:1}
.btn-rem{background:none;border:none;color:var(--faint);font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
.btn-addrow{background:none;border:1.5px dashed var(--line);color:var(--muted);border-radius:11px;width:100%;padding:10px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:2px}
.summary-box{background:var(--surface);border-radius:16px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow-sm);margin-bottom:16px}
.sum-row{display:flex;justify-content:space-between;margin-bottom:8px;align-items:center}
.sum-label{font-size:13px;color:var(--muted);font-weight:500}
.sum-val{font-size:14px;font-weight:700}
.sum-divider{border:none;border-top:1px solid var(--line);margin:12px 0}
.btn-save{width:100%;padding:16px;border-radius:15px;background:var(--brand);border:none;color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .3s;margin-bottom:10px;box-shadow:0 6px 16px rgba(46,100,255,.28)}
.btn-newmonth{width:100%;padding:14px;border-radius:14px;background:var(--surface);border:1.5px solid var(--line);color:var(--muted);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:8px}
.btn-save.saved{background:var(--green);box-shadow:0 6px 16px rgba(22,163,74,.28)}
.save-warn{font-size:11.5px;color:var(--faint);text-align:center;margin-bottom:24px}
.params-row{display:flex;gap:10px}
.seg{display:flex;gap:6px;background:var(--surface-2);border-radius:12px;padding:4px}
.seg-btn{flex:1;padding:9px;border:none;border-radius:9px;background:transparent;color:var(--muted);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}
.seg-btn.on{background:var(--brand);color:#fff;box-shadow:0 2px 6px rgba(233,87,127,.3)}
.params-row .field:first-child{flex:2}
.params-row .field:last-child{flex:1}

/* ── Recap (capture) ──────────────────────── */
.btn-recap{width:100%;padding:14px;border-radius:14px;background:var(--brand-soft);border:1.5px solid var(--brand);color:var(--brand);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:16px}
.recap-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px;overflow-y:auto;backdrop-filter:blur(3px)}
.recap-hint{color:#fff;font-size:13px;font-weight:600;text-align:center;margin-bottom:14px;opacity:.95}
.recap-card{width:100%;max-width:380px;background:#fff;border-radius:24px;padding:26px 24px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.rc-head{text-align:center;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:18px}
.rc-month{font-size:13px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.rc-tag{display:inline-block;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:10px}
.rc-hero{text-align:center;margin:6px 0 22px}
.rc-hero-label{font-size:12px;color:var(--faint);font-weight:600}
.rc-hero-val{font-size:42px;font-weight:800;letter-spacing:-1.5px;line-height:1.05;margin-top:2px}
.rc-grid{display:flex;gap:12px;margin-bottom:22px}
.rc-cell{flex:1;background:var(--surface-2);border-radius:14px;padding:13px;text-align:center}
.rc-cell-l{font-size:11px;color:var(--faint);font-weight:600;margin-bottom:5px}
.rc-cell-v{font-size:18px;font-weight:800;letter-spacing:-.4px}
.rc-sec{font-size:11px;color:var(--faint);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px}
.rc-cat{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.rc-cat-name{font-size:13px;font-weight:600;width:78px;flex-shrink:0}
.rc-cat-bar-bg{flex:1;height:8px;border-radius:5px;background:var(--surface-2);overflow:hidden}
.rc-cat-bar{height:100%;border-radius:5px}
.rc-cat-val{font-size:12.5px;font-weight:700;width:62px;text-align:right;flex-shrink:0}
.rc-foot{text-align:center;font-size:11px;color:var(--faint);margin-top:20px;padding-top:16px;border-top:1px solid var(--line)}
.recap-close{margin-top:18px;padding:12px 28px;border-radius:14px;background:#fff;border:none;color:var(--text);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}

/* ── Bottom nav ───────────────────────────── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(255,255,255,.85);backdrop-filter:blur(18px);border-top:1px solid var(--line);display:flex}
.nav-btn{flex:1;background:none;border:none;color:var(--faint);display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));font-family:inherit;cursor:pointer;transition:color .2s}
.nav-btn.active{color:var(--brand)}
.nav-icon{font-size:22px}
.nav-label{font-size:11px;font-weight:600}
.nav-btn.active .nav-label{font-weight:700}
</style>

<body>
<div id="root"></div>

<script>
// ── Data (clés localStorage inchangées : bc / bw) ─────────────────
const DEFAULT_CONFIG = {
  month: "Juin 2026", weeksInMonth: 4, envMode: "auto", envFixed: 180,
  charges: [],
  income: []
};

// Catégories pour le donut + saisie rapide
const CATEGORIES = [
  {key:"Courses",   color:"#E9577F"},
  {key:"Restaurant",color:"#16A34A"},
  {key:"Transport", color:"#D97706"},
  {key:"Loisirs",   color:"#9333EA"},
  {key:"Shopping",  color:"#DB2777"},
  {key:"Santé",     color:"#0891B2"},
  {key:"Autre",     color:"#9C7080"}
];
function catColor(k){const c=CATEGORIES.find(x=>x.key===k);return c?c.color:"#9C7080"}

function loadData(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}
function saveData(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function emptyWeeks(n){return Array.from({length:n},(_,i)=>({id:i+1,label:`Semaine ${i+1}`,expenses:[]}))}
function fmt(n){return Number(n||0).toLocaleString("fr-FR")}
function pct(u,t){return t?Math.min(100,Math.round(u/t*100)):0}
function colP(p){return p>=90?"#DC2626":p>=70?"#D97706":"#16A34A"}
function colSoft(p){return p>=90?"#FEE2E2":p>=70?"#FEF3C7":"#DCFCE7"}
function el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e}
function genId(){return Date.now()+Math.random()}
const NS="http://www.w3.org/2000/svg";
function svgEl(tag,attrs){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e}

// ── State ─────────────────────────────────────────────────────────
let state = {
  tab: "home",
  config: loadData("bc_m") || DEFAULT_CONFIG,
  weeks: loadData("bw_m") || emptyWeeks((loadData("bc_m")||DEFAULT_CONFIG).weeksInMonth),
  modal: null,
  modalCat: "Courses",
  openWeekId: null,
  recap: false
};
// Migration douce : assure une catégorie sur anciennes dépenses
state.weeks.forEach(w=>w.expenses.forEach(e=>{if(!e.cat)e.cat="Autre"}));
// Migration : champs enveloppe sur anciennes configs sauvegardées
if(!state.config.envMode) state.config.envMode="auto";
if(state.config.envFixed==null) state.config.envFixed=180;

function persist(){saveData("bc_m",state.config);saveData("bw_m",state.weeks);}

// ── Calculs partagés ──────────────────────────────────────────────
function totals(){
  const cfg=state.config;
  const tC=cfg.charges.reduce((s,c)=>s+Number(c.amount||0),0);
  const tI=cfg.income.reduce((s,c)=>s+Number(c.amount||0),0);
  const dispo=tI-tC;
  const nbW=cfg.weeksInMonth||5;
  // Enveloppe : soit fixée par l'utilisatrice, soit calculée (disponible ÷ semaines)
  const env = cfg.envMode==="fixed"
    ? Math.round(Number(cfg.envFixed)||0)
    : Math.round(dispo/nbW);
  const tSpent=state.weeks.reduce((s,w)=>s+w.expenses.reduce((a,e)=>a+Number(e.amount||0),0),0);
  const remaining=dispo-tSpent;
  return {tC,tI,dispo,env,tSpent,remaining};
}

// ── Ring SVG (semaines) ───────────────────────────────────────────
function makeSVGRing(p, size=50){
  const r=(size-8)/2, c=2*Math.PI*r, d=(p/100)*c, col=colP(p);
  const svg=svgEl("svg",{width:size,height:size});
  svg.style.transform="rotate(-90deg)";svg.style.flexShrink="0";
  svg.appendChild(svgEl("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:"#FCEEF3","stroke-width":4}));
  svg.appendChild(svgEl("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:col,"stroke-width":4,"stroke-dasharray":`${d} ${c}`,"stroke-linecap":"round"}));
  const txt=svgEl("text",{x:size/2,y:size/2,"text-anchor":"middle","dominant-baseline":"central",fill:col,"font-size":10,"font-weight":700});
  txt.style.transform="rotate(90deg)";txt.style.transformOrigin=`${size/2}px ${size/2}px`;
  txt.textContent=p+"%";
  svg.appendChild(txt);
  return svg;
}

// ── Render ────────────────────────────────────────────────────────
function render(){
  const root=document.getElementById("root");
  root.innerHTML="";
  if(state.tab==="home") root.appendChild(renderHome());
  else if(state.tab==="stats") root.appendChild(renderStats());
  else root.appendChild(renderConfig());
  root.appendChild(renderBottomNav());
  if(state.modal) root.appendChild(renderModal());
  if(state.recap) root.appendChild(renderRecap());
}

// ── HOME ──────────────────────────────────────────────────────────
function renderHome(){
  const cfg=state.config;
  const {dispo,env,tSpent,remaining}=totals();
  const spentPct=pct(tSpent,dispo);

  const div=el("div","");

  // Header
  const head=el("div","head safe");
  const tag = remaining<0
    ? `<span class="head-tag" style="background:var(--red-soft);color:var(--red)">Dépassé</span>`
    : `<span class="head-tag" style="background:var(--green-soft);color:var(--green)">Dans le budget</span>`;
  head.innerHTML=`<div class="head-row"><div class="head-month">${cfg.month}</div>${tag}</div>`;
  div.appendChild(head);

  // Hero
  const hero=el("div","hero");
  hero.innerHTML=`
    <div class="hero-label">Restant ce mois</div>
    <div class="hero-amount num">${fmt(remaining)} €</div>
    <div class="hero-bar-bg"><div class="hero-bar" style="width:${spentPct}%"></div></div>
    <div class="hero-foot"><span>${fmt(tSpent)} € dépensés</span><span>${fmt(dispo)} € dispo</span></div>`;
  div.appendChild(hero);

  // Stat chips
  const stats=el("div","stats");
  stats.innerHTML=`
    <div class="stat"><div class="stat-label">Enveloppe / sem.</div><div class="stat-val num" style="color:var(--brand)">${fmt(env)} €</div></div>
    <div class="stat"><div class="stat-label">Dépensé</div><div class="stat-val num" style="color:var(--amber)">${fmt(tSpent)} €</div></div>
    <div class="stat"><div class="stat-label">Restant</div><div class="stat-val num" style="color:${remaining<0?"var(--red)":"var(--green)"}">${fmt(remaining)} €</div></div>`;
  div.appendChild(stats);

  // Weeks
  const tab=el("div","tab-content");
  tab.innerHTML=`<div class="section-title">Semaines<span class="muted">${fmt(env)} € / sem.</span></div>`;
  state.weeks.forEach(w=>tab.appendChild(renderWeekCard(w,env)));
  div.appendChild(tab);
  return div;
}

function renderWeekCard(week, env){
  const used=week.expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const left=env-used;
  const p=pct(used,env), col=colP(p), over=used>env, isOpen=state.openWeekId===week.id;
  const card=el("div","week-card");

  const row=el("div","week-row");
  row.appendChild(makeSVGRing(p));
  const info=el("div","week-info");
  info.innerHTML=`
    <div class="week-name">${week.label}</div>
    <div class="week-amounts num">${fmt(used)} € / ${fmt(env)} €${over?`<span class="week-over">+${fmt(used-env)} €</span>`:""}</div>

// 1) Barres : dépenses par semaine vs enveloppe
function chartBars(env){
  const card=el("div","card");
  card.innerHTML=`<div class="card-h">Dépenses par semaine</div><div class="card-sub">Comparé à l'enveloppe (${fmt(env)} €)</div>`;
  const data=state.weeks.map(w=>w.expenses.reduce((s,e)=>s+Number(e.amount||0),0));
  const maxV=Math.max(env,...data,1)*1.12;
  const W=370,H=170,padB=26,padL=4,n=data.length||1;
  const gap=12, bw=(W-padL*2-gap*(n-1))/n;
  const svg=svgEl("svg",{viewBox:`0 0 ${W} ${H}`,class:"chart-svg"});

  // ligne enveloppe
  const envY=H-padB-(env/maxV)*(H-padB-10);
  svg.appendChild(svgEl("line",{x1:padL,y1:envY,x2:W-padL,y2:envY,stroke:"#E9577F","stroke-width":1.5,"stroke-dasharray":"4 4",opacity:.5}));
  const envLbl=svgEl("text",{x:W-padL,y:envY-5,"text-anchor":"end",fill:"#E9577F","font-size":10,"font-weight":700});
  envLbl.textContent="Enveloppe";svg.appendChild(envLbl);

  data.forEach((v,i)=>{
    const x=padL+i*(bw+gap);
    const h=Math.max(2,(v/maxV)*(H-padB-10));
    const y=H-padB-h, p=pct(v,env);
    svg.appendChild(svgEl("rect",{x,y:10,width:bw,height:H-padB-10,rx:7,fill:"#FCEEF3"}));
    const bar=svgEl("rect",{x,y,width:bw,height:h,rx:7,fill:colP(p)});
    svg.appendChild(bar);
    if(v>0){
      const vt=svgEl("text",{x:x+bw/2,y:y-5,"text-anchor":"middle",fill:"#3A1F2B","font-size":10,"font-weight":700});
      vt.textContent=fmt(Math.round(v));svg.appendChild(vt);
    }
    const lt=svgEl("text",{x:x+bw/2,y:H-9,"text-anchor":"middle",fill:"#C99BAD","font-size":10,"font-weight":600});
    lt.textContent="S"+(i+1);svg.appendChild(lt);
  });
  card.appendChild(svg);
  return card;
}

// 2) Donut : répartition par catégorie
function chartDonut(){
  const card=el("div","card");
  card.innerHTML=`<div class="card-h">Répartition par catégorie</div><div class="card-sub">Sur le mois en cours</div>`;
  const sums={};
  state.weeks.forEach(w=>w.expenses.forEach(e=>{const k=e.cat||"Autre";sums[k]=(sums[k]||0)+Number(e.amount||0);}));
  const entries=Object.entries(sums).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const total=entries.reduce((s,[,v])=>s+v,0);

  if(total===0){card.innerHTML+=`<div class="empty-chart">Aucune dépense enregistrée</div>`;return card;}

  const size=180,cx=size/2,cy=size/2,r=70,sw=26;
  const svg=svgEl("svg",{viewBox:`0 0 ${size} ${size}`,width:"180",height:"180"});
  svg.style.display="block";svg.style.margin="0 auto";
  let ang=-Math.PI/2;
  const C=2*Math.PI*r;
  entries.forEach(([k,v])=>{
    const frac=v/total, len=frac*C;
    const circle=svgEl("circle",{cx,cy,r,fill:"none",stroke:catColor(k),"stroke-width":sw,
      "stroke-dasharray":`${len} ${C-len}`,"stroke-dashoffset":-(ang+Math.PI/2)/(2*Math.PI)*C});
    circle.setAttribute("transform",`rotate(-90 ${cx} ${cy})`);
    svg.appendChild(circle);
    ang+=frac*2*Math.PI;
  });
  // centre
  const t1=svgEl("text",{x:cx,y:cy-4,"text-anchor":"middle",fill:"#3A1F2B","font-size":20,"font-weight":800});
  t1.textContent=fmt(Math.round(total))+" €";svg.appendChild(t1);
  const t2=svgEl("text",{x:cx,y:cy+14,"text-anchor":"middle",fill:"#C99BAD","font-size":11,"font-weight":600});
  t2.textContent="total";svg.appendChild(t2);
  card.appendChild(svg);

  const leg=el("div","legend");
  entries.forEach(([k,v])=>{
    const item=el("div","leg-item");
    item.innerHTML=`<span class="leg-dot" style="background:${catColor(k)}"></span>${k}<span class="leg-val num">${fmt(Math.round(v))} €</span>`;
    leg.appendChild(item);
  });
  card.appendChild(leg);
  return card;
}

// 3) Courbe : évolution du restant cumulé semaine après semaine
function chartLine(dispo){
  const card=el("div","card");
  card.innerHTML=`<div class="card-h">Évolution du restant</div><div class="card-sub">Solde disponible au fil des semaines</div>`;
  const pts=[dispo];let run=dispo;
  state.weeks.forEach(w=>{run-=w.expenses.reduce((s,e)=>s+Number(e.amount||0),0);pts.push(run);});

  const W=370,H=170,padL=6,padR=6,padT=14,padB=24;
  const minV=Math.min(0,...pts),maxV=Math.max(...pts,1);
  const range=(maxV-minV)||1;
  const n=pts.length;
  const xx=i=>padL+i*((W-padL-padR)/(n-1));
  const yy=v=>padT+(1-(v-minV)/range)*(H-padT-padB);
  const svg=svgEl("svg",{viewBox:`0 0 ${W} ${H}`,class:"chart-svg"});

  // ligne zéro
  if(minV<0){const zy=yy(0);svg.appendChild(svgEl("line",{x1:padL,y1:zy,x2:W-padR,y2:zy,stroke:"#DC2626","stroke-width":1,"stroke-dasharray":"3 3",opacity:.5}));}

  // aire
  let dPath=`M ${xx(0)} ${yy(pts[0])}`;
  pts.forEach((v,i)=>{if(i>0)dPath+=` L ${xx(i)} ${yy(v)}`;});
  const area=dPath+` L ${xx(n-1)} ${yy(minV)} L ${xx(0)} ${yy(minV)} Z`;
  const grad=svgEl("linearGradient",{id:"ag",x1:0,y1:0,x2:0,y2:1});
  grad.appendChild(svgEl("stop",{offset:"0%","stop-color":"#E9577F","stop-opacity":.18}));
  grad.appendChild(svgEl("stop",{offset:"100%","stop-color":"#E9577F","stop-opacity":0}));
  const defs=svgEl("defs",{});defs.appendChild(grad);svg.appendChild(defs);
  svg.appendChild(svgEl("path",{d:area,fill:"url(#ag)"}));
  svg.appendChild(svgEl("path",{d:dPath,fill:"none",stroke:"#E9577F","stroke-width":2.5,"stroke-linejoin":"round","stroke-linecap":"round"}));

  pts.forEach((v,i)=>{
    svg.appendChild(svgEl("circle",{cx:xx(i),cy:yy(v),r:i===n-1?4.5:3,fill:v<0?"#DC2626":"#E9577F",stroke:"#fff","stroke-width":2}));
    const lt=svgEl("text",{x:xx(i),y:H-7,"text-anchor":"middle",fill:"#C99BAD","font-size":9.5,"font-weight":600});
    lt.textContent=i===0?"Début":"S"+i;svg.appendChild(lt);
  });
  // valeur finale
  const last=pts[n-1];
  const vt=svgEl("text",{x:xx(n-1),y:yy(last)-9,"text-anchor":"end",fill:last<0?"#DC2626":"#3A1F2B","font-size":11,"font-weight":800});
  vt.textContent=fmt(Math.round(last))+" €";svg.appendChild(vt);
  card.appendChild(svg);
  return card;
}

// ── CONFIG ────────────────────────────────────────────────────────
function renderConfig(){
  const loc=state.config; // travail direct sur l'état réel, auto-sauvegardé
  const tC=loc.charges.reduce((s,c)=>s+Number(c.amount||0),0);
  const tI=loc.income.reduce((s,c)=>s+Number(c.amount||0),0);
  const dispo=tI-tC, env=Math.round(dispo/(loc.weeksInMonth||5));

  const wrap=el("div","config-wrap safe");
  wrap.innerHTML=`<div class="config-title" style="padding-top:6px">Configuration</div>
    <div class="config-sub">Tout est enregistré automatiquement.</div>`;

  const psec=el("div","");
  psec.innerHTML=`<div class="sec-head">Paramètres</div>`;
  const pbox=el("div","sec-box");
  const isFixed=loc.envMode==="fixed";
  pbox.innerHTML=`<div class="params-row">
      <div class="field"><div class="field-label">MOIS</div><input id="cfg-month" type="text" value="${loc.month}"></div>
      <div class="field"><div class="field-label">SEMAINES</div><input id="cfg-weeks" type="number" value="${loc.weeksInMonth}" min="4" max="6" inputmode="numeric"></div>
    </div>
    <div class="field" style="margin-top:4px">
      <div class="field-label">ENVELOPPE HEBDO</div>
      <div class="seg">
        <button class="seg-btn${!isFixed?" on":""}" data-env="auto">Automatique</button>
        <button class="seg-btn${isFixed?" on":""}" data-env="fixed">Montant fixe</button>
      </div>
    </div>
    <div class="field" id="env-fixed-wrap" style="${isFixed?"":"display:none"}">
      <div class="field-label">MONTANT FIXE PAR SEMAINE (€)</div>
      <input id="cfg-envfixed" type="number" value="${loc.envFixed||0}" inputmode="decimal" placeholder="180">
    </div>`;
  psec.appendChild(pbox);wrap.appendChild(psec);

  wrap.appendChild(makeSection("Charges","charges",loc.charges,"chg-total"));
  wrap.appendChild(makeSection("Revenus","income",loc.income,"inc-total"));

  const sumbox=el("div","summary-box");
  sumbox.innerHTML=`
    <div class="sum-row"><span class="sum-label">Total charges</span><span class="sum-val num" id="sum-charges" style="color:var(--amber)">− ${fmt(tC)} €</span></div>
    <div class="sum-row"><span class="sum-label">Total revenus</span><span class="sum-val num" id="sum-income" style="color:var(--green)">+ ${fmt(tI)} €</span></div>
    <hr class="sum-divider">
    <div class="sum-row"><span class="sum-label">Disponible</span><span class="sum-val num" id="sum-dispo" style="color:${dispo<0?"var(--red)":"var(--text)"};font-size:16px">${fmt(dispo)} €</span></div>
    <div class="sum-row"><span class="sum-label" id="sum-env-label">${loc.envMode==="fixed"?"Enveloppe / sem. (fixe)":"Enveloppe / sem. (×"+loc.weeksInMonth+")"}</span><span class="sum-val num" id="sum-env" style="color:var(--brand)">${fmt(env)} €</span></div>`;
  wrap.appendChild(sumbox);

  // Bouton "Nouveau mois" : remet à zéro UNIQUEMENT les dépenses des semaines (avec confirmation)
  const newMonthBtn=el("button","btn-newmonth","↺ Commencer un nouveau mois");
  newMonthBtn.id="cfg-newmonth";wrap.appendChild(newMonthBtn);
  wrap.appendChild(el("div","save-warn","Vide les dépenses hebdo · garde tes charges et revenus"));

  // Met à jour uniquement les chiffres affichés, sans recréer les inputs (garde le focus/clavier actif)
  function refreshSummary(){
    const loc2=state.config;
    const tC2=loc2.charges.reduce((s,c)=>s+Number(c.amount||0),0);
    const tI2=loc2.income.reduce((s,c)=>s+Number(c.amount||0),0);
    const dispo2=tI2-tC2;
    const env2 = loc2.envMode==="fixed" ? Math.round(Number(loc2.envFixed)||0) : Math.round(dispo2/(loc2.weeksInMonth||5));
    wrap.querySelector("#chg-total").textContent="Charges — "+fmt(tC2)+" €";
    wrap.querySelector("#inc-total").textContent="Revenus — "+fmt(tI2)+" €";
    wrap.querySelector("#sum-charges").textContent="− "+fmt(tC2)+" €";
    wrap.querySelector("#sum-income").textContent="+ "+fmt(tI2)+" €";
    const sd=wrap.querySelector("#sum-dispo");sd.textContent=fmt(dispo2)+" €";
    sd.style.color=dispo2<0?"var(--red)":"var(--text)";
    wrap.querySelector("#sum-env").textContent=fmt(env2)+" €";
    wrap.querySelector("#sum-env-label").textContent=loc2.envMode==="fixed"?"Enveloppe / sem. (fixe)":`Enveloppe / sem. (×${loc2.weeksInMonth})`;
  }

  wrap.addEventListener("input",e=>{
    const t=e.target;
    if(t.id==="cfg-month"){state.config.month=t.value;persist();return;}
    if(t.id==="cfg-envfixed"){state.config.envFixed=parseFloat(t.value)||0;persist();refreshSummary();return;}
    if(t.id==="cfg-weeks"){
      const n=Math.min(6,Math.max(4,parseInt(t.value)||4));
      state.config.weeksInMonth=n;
      // ajuste le nombre de semaines sans effacer les dépenses existantes
      if(state.weeks.length<n){
        for(let i=state.weeks.length;i<n;i++) state.weeks.push({id:i+1,label:`Semaine ${i+1}`,expenses:[]});
      } else if(state.weeks.length>n){
        state.weeks=state.weeks.slice(0,n);
      }
      persist();refreshSummary();return;
    }
    if(t.dataset.sec&&t.dataset.id&&t.dataset.field){
      const sec=t.dataset.sec,id=Number(t.dataset.id),field=t.dataset.field;
      state.config[sec]=state.config[sec].map(x=>{
        if(x.id!==id)return x;let v=t.value;if(field==="amount")v=parseFloat(v)||0;return{...x,[field]:v};
      });
      persist();refreshSummary();
    }
  });
  wrap.addEventListener("click",e=>{
    const t=e.target;
    if(t.classList.contains("seg-btn")){
      state.config.envMode=t.dataset.env;
      persist();
      // bascule l'état visuel des boutons + affichage du champ montant fixe
      wrap.querySelectorAll(".seg-btn").forEach(b=>b.classList.toggle("on",b.dataset.env===state.config.envMode));
      wrap.querySelector("#env-fixed-wrap").style.display = state.config.envMode==="fixed" ? "" : "none";
      refreshSummary();
      return;
    }
    if(t.classList.contains("btn-rem")){const sec=t.dataset.sec,id=Number(t.dataset.id);state.config[sec]=state.config[sec].filter(x=>x.id!==id);persist();render();return;}
    if(t.classList.contains("btn-addrow")){const sec=t.dataset.sec;state.config[sec].push({id:genId(),name:"",amount:0});persist();render();return;}
    if(t.id==="cfg-newmonth"){
      if(confirm("Commencer un nouveau mois ? Cela efface les dépenses des semaines, mais garde tes charges et revenus.")){
        state.weeks=emptyWeeks(state.config.weeksInMonth);
        persist();state.tab="home";render();
      }
    }
  });
  return wrap;
}

function makeSection(title,sec,items,totalId){
  const wrap=el("div","");
  wrap.innerHTML=`<div class="sec-head" id="${totalId}">${title}</div>`;
  const box=el("div","sec-box");
  items.forEach(item=>{
    const row=el("div","item-row");
    row.innerHTML=`
      <input type="text" placeholder="Libellé" value="${item.name||""}" data-sec="${sec}" data-id="${item.id}" data-field="name">
      <input type="number" placeholder="0" value="${Math.abs(item.amount||0)}" inputmode="decimal" data-sec="${sec}" data-id="${item.id}" data-field="amount">
      <button class="btn-rem" data-sec="${sec}" data-id="${item.id}">×</button>`;

  });
  const addBtn=el("button","btn-addrow");addBtn.dataset.sec=sec;addBtn.textContent="+ Ajouter une ligne";
  box.appendChild(addBtn);wrap.appendChild(box);return wrap;
}

// ── RECAP (carte capture d'écran) ─────────────────────────────────
function renderRecap(){
  const cfg=state.config;
  const {dispo,tSpent,remaining}=totals();
  const overlay=el("div","recap-overlay");

  // statut
  let tagBg,tagCol,tagTxt;
  if(remaining<0){tagBg="var(--red-soft)";tagCol="var(--red)";tagTxt="Mois dépassé";}
  else if(remaining<dispo*0.1){tagBg="var(--amber-soft)";tagCol="var(--amber)";tagTxt="Budget serré";}
  else{tagBg="var(--green-soft)";tagCol="var(--green)";tagTxt="Mois maîtrisé";}

  // répartition catégories
  const sums={};
  state.weeks.forEach(w=>w.expenses.forEach(e=>{const k=e.cat||"Autre";sums[k]=(sums[k]||0)+Number(e.amount||0);}));
  const entries=Object.entries(sums).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const maxCat=entries.length?entries[0][1]:1;

  const savedPct=dispo>0?Math.round(remaining/dispo*100):0;

  const cats=entries.length
    ? entries.map(([k,v])=>`
        <div class="rc-cat">
          <span class="rc-cat-name">${k}</span>
          <span class="rc-cat-bar-bg"><span class="rc-cat-bar" style="width:${Math.max(6,v/maxCat*100)}%;background:${catColor(k)}"></span></span>
          <span class="rc-cat-val num">${fmt(Math.round(v))} €</span>
        </div>`).join("")
    : `<div style="color:var(--faint);font-size:13px;text-align:center;padding:8px 0">Aucune dépense ce mois</div>`;

  const card=el("div","recap-card");
  card.innerHTML=`
    <div class="rc-head">
      <div class="rc-month">${cfg.month}</div>
      <div class="rc-tag" style="background:${tagBg};color:${tagCol}">${tagTxt}</div>
    </div>
    <div class="rc-hero">
      <div class="rc-hero-label">Restant en fin de mois</div>
      <div class="rc-hero-val num" style="color:${remaining<0?"var(--red)":"var(--green)"}">${fmt(remaining)} €</div>
    </div>
    <div class="rc-grid">
      <div class="rc-cell"><div class="rc-cell-l">Disponible</div><div class="rc-cell-v num">${fmt(dispo)} €</div></div>
      <div class="rc-cell"><div class="rc-cell-l">Dépensé</div><div class="rc-cell-v num" style="color:var(--amber)">${fmt(tSpent)} €</div></div>
      <div class="rc-cell"><div class="rc-cell-l">Épargné</div><div class="rc-cell-v num" style="color:var(--brand)">${savedPct} %</div></div>
    </div>
    <div class="rc-sec">Répartition par catégorie</div>
    ${cats}
    <div class="rc-foot">Budget · ${cfg.month}</div>`;

  const hint=el("div","recap-hint","📸 Fais une capture d'écran de cette carte, puis enregistre-la dans ton Drive");
  const closeBtn=el("button","recap-close","Fermer");
  closeBtn.addEventListener("click",()=>{state.recap=false;render();});

  overlay.addEventListener("click",e=>{if(e.target===overlay){state.recap=false;render();}});
  overlay.appendChild(hint);
  overlay.appendChild(card);
  overlay.appendChild(closeBtn);
  return overlay;
}

// ── BOTTOM NAV ────────────────────────────────────────────────────
function renderBottomNav(){
  const nav=el("div","bottom-nav safebot");
  [
    {id:"home",icon:"📊",label:"Semaines"},
    {id:"stats",icon:"📈",label:"Stats"},
    {id:"config",icon:"⚙️",label:"Config"}
  ].forEach(item=>{
    const btn=el("button","nav-btn"+(state.tab===item.id?" active":""));
    btn.innerHTML=`<span class="nav-icon">${item.icon}</span><span class="nav-label">${item.label}</span>`;
    btn.addEventListener("click",()=>{state.tab=item.id;render();});
    nav.appendChild(btn);
  });
  return nav;
}

// ── Suppression dépense ───────────────────────────────────────────
document.addEventListener("click",e=>{
  const delBtn=e.target.closest(".btn-del");
  if(delBtn){
    const eid=Number(delBtn.dataset.id),wid=Number(delBtn.dataset.week);
    state.weeks=state.weeks.map(w=>w.id===wid?{...w,expenses:w.expenses.filter(ex=>ex.id!==eid)}:w);
    persist();render();
  }
});

render();
</script>
</body>
</html>
